<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Social</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="header">
    <h1>Cosmic</h1>
  </header>

  <main class="feed">

    <div id="auth" class="card">
      <input id="nickname" placeholder="Ваш ник">
      <button id="login">Войти</button>
    </div>

    <div id="mainUI" class="hidden">

      <div class="card">
        <textarea id="postInput" placeholder="Что нового?"></textarea>
        <button id="postBtn">Опубликовать</button>
      </div>

      <div id="posts"></div>

    </div>

  </main>

</div>

<script src="js/app.js"></script>
</body>
</html>
